type: http
name: File a new claim
url: '{{baseUrl}}/claims'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "policyId": "pol_auto_12345",
      "lineOfBusiness": "auto",
      "incidentDate": "2026-02-15",
      "description": "Rear-end collision at intersection",
      "estimatedDamage": 8500,
      "claimantContact": {
        "name": "Jane Smith",
        "phone": "+1-555-0123",
        "email": "jane.smith@example.com"
      }
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "policyId": "string",
            "lineOfBusiness": "string",
            "status": "under_investigation",
            "incidentDate": "1987-07-09",
            "description": "string",
            "estimatedDamage": 8271.27290587051,
            "filedAt": "2023-01-12T09:52:11.229Z",
            "updatedAt": "2010-12-06T14:52:02.512Z",
            "assignedAdjuster": "string",
            "adjudication": {
              "claimId": "string",
              "decision": "string",
              "approvedAmount": 9818.929707143721,
              "adjudicatedAt": "2006-01-21T17:53:00.996Z",
              "adjusterNotes": "string"
            },
            "settlement": {
              "claimId": "string",
              "amount": 7445.332507722784,
              "paymentMethod": "string",
              "status": "processing",
              "initiatedAt": "1972-09-14T10:37:22.183Z",
              "completedAt": "1996-05-16T10:07:38.641Z",
              "referenceNumber": "string"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Claim filed successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid claim data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: text
        content: ''
    name: Duplicate claim for this incident
