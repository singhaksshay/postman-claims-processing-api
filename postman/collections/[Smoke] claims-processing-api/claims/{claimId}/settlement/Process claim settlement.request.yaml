type: http
name: Process claim settlement
url: '{{baseUrl}}/claims/:claimId/settlement'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: claimId
    value: string
body:
  type: json
  content: |-
    {
      "paymentMethod": "ach",
      "amount": 1699.1823308477838,
      "payeeName": "string",
      "payeeAccountId": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "claimId": "string",
            "amount": 3860.7556620007213,
            "paymentMethod": "string",
            "status": "initiated",
            "initiatedAt": "1953-08-22T20:51:36.568Z",
            "completedAt": "2001-12-01T07:56:57.243Z",
            "referenceNumber": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Settlement initiated
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Claim not eligible for settlement
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Claim not found
