type: http
name: Get claim details
url: '{{baseUrl}}/claims/:claimId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: claimId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "policyId": "string",
            "lineOfBusiness": "string",
            "status": "under_investigation",
            "incidentDate": "1987-07-09",
            "description": "string",
            "estimatedDamage": 8271.27290587051,
            "filedAt": "2023-01-12T09:52:11.229Z",
            "updatedAt": "2010-12-06T14:52:02.512Z",
            "assignedAdjuster": "string",
            "adjudication": {
              "claimId": "string",
              "decision": "string",
              "approvedAmount": 9818.929707143721,
              "adjudicatedAt": "2006-01-21T17:53:00.996Z",
              "adjusterNotes": "string"
            },
            "settlement": {
              "claimId": "string",
              "amount": 7445.332507722784,
              "paymentMethod": "string",
              "status": "processing",
              "initiatedAt": "1972-09-14T10:37:22.183Z",
              "completedAt": "1996-05-16T10:07:38.641Z",
              "referenceNumber": "string"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Claim details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Claim not found
