type: http
name: Service health check
url: '{{baseUrl}}/health'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "unhealthy",
            "version": "string",
            "uptime": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is healthy
