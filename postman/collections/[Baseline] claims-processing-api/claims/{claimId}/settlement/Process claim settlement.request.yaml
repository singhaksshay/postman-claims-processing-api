type: http
name: Process claim settlement
url: '{{baseUrl}}/claims/:claimId/settlement'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: claimId
    value: string
body:
  type: json
  content: |-
    {
      "paymentMethod": "ach",
      "amount": 1873.1448149869557,
      "payeeName": "string",
      "payeeAccountId": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "claimId": "string",
            "amount": 329.8217696460681,
            "paymentMethod": "string",
            "status": "processing",
            "initiatedAt": "1963-12-24T06:03:19.914Z",
            "completedAt": "1970-10-26T21:40:01.274Z",
            "referenceNumber": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Settlement initiated
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Claim not eligible for settlement
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Claim not found
